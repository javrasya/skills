<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>/learn — rate limiting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF6EE; --paper-2:#F3ECDE; --panel:#FFFFFF;
    --ink:#1A1814; --ink-soft:#56503F; --ink-faint:#8C8472;
    --line:#E4DBC9; --line-soft:#EEE7D8;
    --accent:#0E7C63; --accent-ink:#0A4A3B; --accent-bg:#DEEFE9;
    --warn:#C2521E; --warn-ink:#7E3413; --warn-bg:#F6E2D6;
    --c4-in-fill:#DCEBFF; --c4-in-stroke:#3B6FB0;
    --c4-ext-fill:#ECEAE6; --c4-ext-stroke:#9A9484;
    --c4-person-fill:#E7F3EC; --c4-person-stroke:#3E8E63;
    --c4-ring:rgba(59,111,176,.22);
    --display:'Fraunces',Georgia,'Times New Roman',serif;
    --sans:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#15130E; --paper-2:#1E1B14; --panel:#211D16;
      --ink:#EEE8DA; --ink-soft:#B6AE9C; --ink-faint:#7E7666;
      --line:#322D23; --line-soft:#2A2620;
      --accent:#36B597; --accent-ink:#86D9C6; --accent-bg:#10332A;
      --warn:#E0764D; --warn-ink:#F0AB8C; --warn-bg:#2D1A11;
      --c4-in-fill:#15324F; --c4-in-stroke:#5E92CC;
      --c4-ext-fill:#262219; --c4-ext-stroke:#6F6856;
      --c4-person-fill:#12352A; --c4-person-stroke:#4FA579;
      --c4-ring:rgba(94,146,204,.28);
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:var(--sans); color:var(--ink); background:var(--paper);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    line-height:1.62; font-size:15px;
  }
  button{font-family:inherit; cursor:pointer; color:inherit}
  ::selection{background:var(--accent-bg)}

  /* ---------- progress bar ---------- */
  #bar{position:fixed; top:0; left:0; right:0; height:3px; background:var(--line-soft); z-index:60}
  #bar > i{display:block; height:100%; width:0; background:var(--accent); transition:width .6s cubic-bezier(.2,.7,.2,1)}

  /* ---------- shell ---------- */
  #app{display:grid; grid-template-columns:262px minmax(0,1fr) 332px; height:100%; padding-top:3px}
  @media (max-width:1040px){ #app{grid-template-columns:1fr} }

  /* ---------- left rail / chapters ---------- */
  #rail{border-right:1px solid var(--line); padding:30px 22px; overflow:auto; background:var(--paper)}
  #rail .brand{font-family:var(--mono); font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint)}
  #rail .lesson{font-family:var(--display); font-size:25px; line-height:1.12; font-weight:600; margin:10px 0 4px; letter-spacing:-.01em}
  #rail .sub{font-size:13px; color:var(--ink-soft); margin-bottom:26px}
  .chap{display:flex; gap:13px; padding:11px 10px; border-radius:9px; margin:2px -10px; transition:background .2s; position:relative}
  .chap[data-state="active"]{background:var(--paper-2)}
  .chap[data-on="1"]{cursor:pointer}
  .chap[data-on="1"]:hover{background:var(--paper-2)}
  .chap[data-state="locked"]{opacity:.42; cursor:not-allowed}
  .chap .dot{flex:none; width:26px; height:26px; border-radius:50%; border:1.5px solid var(--line);
    display:grid; place-items:center; font-family:var(--mono); font-size:11px; color:var(--ink-faint);
    background:var(--paper); transition:.25s}
  .chap[data-state="active"] .dot{border-color:var(--accent); color:var(--accent); box-shadow:0 0 0 4px var(--accent-bg)}
  .chap[data-state="done"] .dot{border-color:var(--accent); background:var(--accent); color:#fff}
  @media (prefers-color-scheme: dark){ .chap[data-state="done"] .dot{color:#11130f} }
  .chap .ct{min-width:0}
  .chap .ck{font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-faint)}
  .chap .cn{font-size:14.5px; font-weight:500; margin-top:1px}
  .chap[data-state="locked"] .cn::after{content:" ·"; }
  #rail .foot{margin-top:26px; padding-top:18px; border-top:1px solid var(--line-soft); font-family:var(--mono); font-size:11px; color:var(--ink-faint); line-height:1.7}

  @media (max-width:1040px){
    #rail{border-right:none; border-bottom:1px solid var(--line); padding:18px 16px 14px; position:sticky; top:3px; z-index:30}
    #rail .foot{display:none}
    .rail-chaps{display:flex; gap:8px; overflow:auto; margin:0 -16px; padding:4px 16px; scrollbar-width:none}
    .rail-chaps::-webkit-scrollbar{display:none}
    .chap{flex:none; margin:0; width:auto; padding:8px 12px; border:1px solid var(--line); border-radius:99px; gap:8px}
    .chap .ct .ck{display:none}
    .chap .cn{font-size:13px}
  }

  /* ---------- center stage ---------- */
  #stage{overflow:auto; padding:34px 46px 90px; position:relative}
  @media (max-width:1040px){ #stage{padding:22px 18px 90px} }
  .stage-head{display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:8px}
  .kicker{font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); font-weight:500}
  .dec-toggle{display:none}
  @media (max-width:1040px){
    .dec-toggle{display:inline-flex; align-items:center; gap:7px; border:1px solid var(--line); background:var(--panel);
      padding:7px 13px; border-radius:99px; font-size:12.5px; font-weight:500}
    .dec-toggle b{font-family:var(--mono); background:var(--accent); color:#fff; border-radius:99px; padding:0 7px; font-size:11px}
  }
  /* TEMP dev module switcher + mandatory reset (Step 2) */
  .devmod-wrap{display:inline-flex; align-items:center; gap:7px; font-family:var(--mono); font-size:10.5px; letter-spacing:.08em;
    text-transform:uppercase; color:var(--ink-faint); border:1px dashed var(--line); border-radius:99px; padding:5px 6px 5px 12px; background:var(--paper-2)}
  .devmod-wrap select{font-family:var(--sans); font-size:12.5px; color:var(--ink); background:var(--panel); border:1px solid var(--line);
    border-radius:99px; padding:5px 10px; cursor:pointer}
  .devmod-wrap select:focus{outline:none; border-color:var(--accent)}
  .resetbtn{border:1px solid var(--line); background:var(--panel); color:var(--ink-soft); border-radius:99px;
    padding:6px 13px; font-size:12.5px; font-weight:500; transition:.16s}
  .resetbtn:hover{border-color:var(--warn); color:var(--warn)}
  /* fixit code block */
  .codebox{font-family:var(--mono); font-size:13px; line-height:1.55; color:var(--ink); background:var(--paper-2);
    border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin:0; white-space:pre-wrap; overflow:auto}
  h1.title{font-family:var(--display); font-weight:600; font-size:clamp(28px,4vw,42px); line-height:1.05; letter-spacing:-.02em; margin:.1em 0 .35em}
  .lede{font-size:17px; color:var(--ink-soft); max-width:60ch; margin:0 0 22px}
  .panes{position:relative}
  .pane{animation:rise .5s cubic-bezier(.2,.7,.2,1) both}
  @keyframes rise{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none}}

  .card{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:22px 24px}
  .card + .card{margin-top:16px}
  .label{font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:9px}

  .btn{display:inline-flex; align-items:center; gap:9px; border:1px solid var(--ink); background:var(--ink); color:var(--paper);
    padding:11px 20px; border-radius:99px; font-size:14px; font-weight:500; transition:.18s}
  .btn:hover{transform:translateY(-1px)}
  .btn:disabled{opacity:.4; cursor:not-allowed; transform:none}
  .btn.ghost{background:transparent; color:var(--ink); border-color:var(--line)}
  .btn.ghost:hover{border-color:var(--ink-faint); background:var(--paper-2)}
  .btn .arr{transition:transform .2s}
  .btn:not(:disabled):hover .arr{transform:translateX(3px)}
  .actions{display:flex; gap:12px; align-items:center; margin-top:26px; flex-wrap:wrap}
  .hint{font-size:13px; color:var(--ink-faint)}

  /* ---------- C4 diagram ---------- */
  .diagram{background:var(--paper-2); border:1px solid var(--line); border-radius:14px; padding:14px 16px 16px; margin:4px 0 6px}
  .crumbs{display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:12px; margin-bottom:6px; flex-wrap:wrap}
  .crumbs button{border:none; background:none; padding:2px 4px; color:var(--ink-faint); border-radius:6px}
  .crumbs button.on{color:var(--ink); font-weight:500}
  .crumbs button:not(.on):not(:disabled):hover{color:var(--accent)}
  .crumbs button:disabled{color:var(--ink-faint); opacity:.45; cursor:default}
  .crumbs .sep{color:var(--line); }
  .crumbs .spacer{flex:1}
  .zoutbtn{border:1px solid var(--line)!important; padding:3px 10px!important; color:var(--ink-soft)!important; background:var(--panel)!important}
  .scene-wrap{position:relative; width:100%; aspect-ratio:1220/580; min-height:340px; overflow:hidden; border-radius:10px; background:var(--paper-2)}
  .scene{position:absolute; inset:0; opacity:0; pointer-events:none; transform-origin:0 0;
         transition:transform .58s cubic-bezier(.45,.02,.18,1), opacity .42s ease}
  /* will-change:transform is added ONLY during an active zoom (see zoomStep) and
     removed when it settles. Leaving it on permanently promotes each .scene to a
     GPU layer that rasters once at pre-web-font height, so text painted taller
     after fonts load stays visually clipped. */
  .scene.zooming{will-change:transform,opacity}
  .scene svg{width:100%; height:100%; display:block}
  #tracewrap > svg{position:absolute; inset:0; width:100%; height:100%; display:block}
  .nz{cursor:pointer}
  .nz .nbx{transition:.18s}
  .nz:hover .nbx{filter:brightness(.97)}
  .ztag{font-family:var(--mono); font-size:9px; fill:var(--accent)}
  .ntitle{font-weight:500; font-size:13px}
  .nsub{font-size:11px; fill:var(--ink-faint)}
  .diagram .legend{font-size:12px; color:var(--ink-faint); margin-top:8px; display:flex; gap:16px; flex-wrap:wrap; align-items:center}
  .diagram .legend i{display:inline-block; width:9px; height:9px; border-radius:3px; margin-right:6px; vertical-align:-1px}

  /* ---- C4 grammar ---- */
  .c4title{font-family:var(--mono); font-size:11px; letter-spacing:.07em; text-transform:uppercase; color:var(--ink-soft); font-weight:500; margin-bottom:7px}
  .c4fo{overflow:visible}
  /* fonts/sizes are in the SVG's 1220-unit coordinate space, so they look ~0.6x
     on screen once the diagram scales to the column — hence the larger numbers. */
  .c4node{box-sizing:border-box; width:100%; min-height:100%; border:2.5px solid var(--c4-in-stroke); background:var(--c4-in-fill);
    border-radius:18px; padding:18px 22px 16px; display:flex; flex-direction:column; gap:3px; position:relative; font-family:var(--sans); line-height:1.32}
  .c4node.ext{border-color:var(--c4-ext-stroke); background:var(--c4-ext-fill); border-style:solid}
  .c4node.person{border-color:var(--c4-person-stroke); background:var(--c4-person-fill)}
  /* person glyph is drawn as an SVG badge in frame coords (see personBadge);
     give the person box a little top room so the name clears the badge */
  .c4node.haspers{padding-left:64px}
  .c4pbadge circle, .c4pbadge path{fill:var(--c4-person-fill); stroke:var(--c4-person-stroke); stroke-width:2.6}
  .c4node.store{border-bottom-width:7px}
  .c4name{font-weight:600; font-size:23px; color:var(--ink); letter-spacing:-.01em}
  .c4type{font-family:var(--mono); font-size:15px; color:var(--ink-faint); letter-spacing:.01em}
  .c4desc{font-size:18px; color:var(--ink-soft); margin-top:3px; line-height:1.3}
  .c4node.hot{cursor:pointer; transition:box-shadow .16s, border-color .16s}
  .c4node.hot:hover{box-shadow:0 0 0 6px var(--c4-ring); border-color:var(--accent)}
  /* focus-dimming (Q10): the scene's focus boxes get a highlight ring; the rest
     of the in-scope boxes fade into fog so the eye lands on the module's subject. */
  .c4node{transition:box-shadow .35s, border-color .35s, opacity .4s, filter .4s}
  .c4node.dim{opacity:.34; filter:grayscale(.55)}
  .c4node.focus{box-shadow:0 0 0 6px var(--accent-bg); border-color:var(--accent)}
  .c4node.focus.hot:hover{box-shadow:0 0 0 6px var(--c4-ring)}
  .c4hint{font-family:var(--mono); font-size:14px; color:var(--accent); margin-top:auto; padding-top:7px}
  .c4bound{fill:none; stroke:var(--ink-faint); stroke-width:2.2; stroke-dasharray:11 8}
  .c4boundlbl{font-family:var(--mono); font-size:19px; fill:var(--ink-soft); font-weight:500}
  .c4boundtype{font-family:var(--mono); font-size:15px; fill:var(--ink-faint)}
  .edge{stroke:var(--ink-faint); stroke-width:2.2; stroke-dasharray:8 6; fill:none}
  .edgebg{fill:var(--paper-2)}
  .edgelbl{font-family:var(--sans); font-size:14px; fill:var(--ink-soft)}
  .edgetech{font-family:var(--mono); font-size:12px; fill:var(--ink-faint)}
  .legend .lg-in{background:var(--c4-in-fill); border:1.5px solid var(--c4-in-stroke)}
  .legend .lg-ext{background:var(--c4-ext-fill); border:1.5px solid var(--c4-ext-stroke)}
  .legend .lg-person{background:var(--c4-person-fill); border:1.5px solid var(--c4-person-stroke); border-radius:50%}
  .legend .lg-bound{background:transparent; border:1.4px dashed var(--ink-faint); border-radius:2px}
  .legend .lg-rel{width:15px; height:0; border-top:1.6px dashed var(--ink-faint); border-radius:0; margin-bottom:3px}

  .c4topbar{display:flex; align-items:center; gap:10px; margin-bottom:7px}
  .c4topbar .c4title{margin-bottom:0}

  /* ---- flow (dynamic) mode ---- */
  .flowedge{stroke:var(--ink-faint); stroke-width:2.4; stroke-dasharray:8 6; fill:none; opacity:.18; transition:opacity .3s, stroke .3s}
  .flowedge.seen{opacity:.5}
  .flowedge.active{opacity:1; stroke:var(--accent); stroke-width:3.4; stroke-dasharray:none}
  .flownum{font-family:var(--mono); font-weight:600; font-size:17px; fill:#fff}
  .flownum-bg{fill:var(--ink-faint); transition:fill .3s, r .2s}
  .flownum-bg.seen{fill:var(--ink-soft)}
  .flownum-bg.active{fill:var(--accent)}
  .flowfo .c4node{opacity:.4; transition:opacity .3s, box-shadow .3s}
  .flowfo.lit .c4node{opacity:1; box-shadow:0 0 0 4px var(--c4-ring)}
  .flowctl{display:flex; align-items:center; gap:12px; margin-top:10px; flex-wrap:wrap}
  .flowctl button{border:1px solid var(--line); background:var(--panel); border-radius:9px; padding:7px 13px; font-size:13px; font-weight:500; color:var(--ink)}
  .flowctl button:disabled{opacity:.4; cursor:not-allowed}
  .flowctl .step-of{font-family:var(--mono); font-size:12px; color:var(--ink-faint)}
  .flowsteps{list-style:none; margin:12px 0 0; padding:0; display:grid; gap:6px}
  .flowsteps li{display:flex; gap:11px; align-items:flex-start; padding:8px 11px; border:1px solid var(--line-soft); border-radius:9px; font-size:13.5px; color:var(--ink-soft); cursor:pointer; transition:.16s}
  .flowsteps li:hover{border-color:var(--line)}
  .flowsteps li.active{border-color:var(--accent); background:var(--accent-bg); color:var(--ink)}
  .flowsteps li.seen{color:var(--ink)}
  .flowsteps li .sn{flex:none; width:21px; height:21px; border-radius:50%; background:var(--ink-faint); color:#fff; font-family:var(--mono); font-size:11px; display:grid; place-items:center; margin-top:1px}
  .flowsteps li.active .sn{background:var(--accent)}
  .flowsteps li.seen .sn{background:var(--ink-soft)}
  .flowsteps li b{color:var(--ink); font-weight:600}
  .flowsteps li .tech{font-family:var(--mono); font-size:11px; color:var(--ink-faint)}

  /* ---------- confront choices ---------- */
  .choice{display:flex; gap:14px; align-items:flex-start; border:1.5px solid var(--line); background:var(--panel);
    border-radius:12px; padding:15px 17px; margin-top:11px; transition:.16s; text-align:left; width:100%}
  .choice:hover{border-color:var(--ink-faint)}
  .choice[aria-pressed="true"]{border-color:var(--accent); background:var(--accent-bg)}
  .choice .pick{flex:none; width:20px; height:20px; border-radius:50%; border:1.5px solid var(--line-soft); margin-top:2px; transition:.16s}
  .choice[aria-pressed="true"] .pick{border-color:var(--accent); background:var(--accent); box-shadow:inset 0 0 0 3px var(--accent-bg)}
  .choice .ctxt b{display:block; font-weight:500; font-size:15px; margin-bottom:1px}
  .choice .ctxt span{font-size:13.5px; color:var(--ink-soft)}
  .locknote{display:flex; align-items:center; gap:9px; font-size:13px; color:var(--ink-faint); margin-top:18px; font-family:var(--mono)}

  /* reveal / contrast */
  .verdict{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:6px 0 4px}
  @media (max-width:560px){ .verdict{grid-template-columns:1fr} }
  .vcell{border:1px solid var(--line); border-radius:12px; padding:16px 18px; background:var(--panel)}
  .vcell.you{border-color:var(--warn); background:var(--warn-bg)}
  .vcell.real{border-color:var(--accent); background:var(--accent-bg)}
  .vcell .vh{font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; margin-bottom:7px}
  .vcell.you .vh{color:var(--warn-ink)} .vcell.real .vh{color:var(--accent-ink)}
  .vcell p{margin:0; font-size:14px} .vcell .big{font-family:var(--display); font-size:18px; font-weight:600; margin-bottom:4px}

  /* ---------- simulator ---------- */
  .sim{margin:4px 0}
  .sim .simbar{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px}
  .seg{display:inline-flex; border:1px solid var(--line); border-radius:99px; padding:3px; background:var(--paper-2)}
  .seg button{border:none; background:none; padding:7px 15px; border-radius:99px; font-size:13px; font-weight:500; color:var(--ink-soft)}
  .seg button.on{background:var(--ink); color:var(--paper)}
  .track{position:relative; height:118px; border:1px solid var(--line); border-radius:12px; background:var(--panel); overflow:hidden}
  .boundary{position:absolute; top:0; bottom:22px; left:50%; width:2px; background:repeating-linear-gradient(var(--ink-faint) 0 5px,transparent 5px 10px); opacity:.6}
  .boundary span{position:absolute; top:6px; left:8px; font-family:var(--mono); font-size:10px; color:var(--ink-faint); white-space:nowrap}
  .window{position:absolute; top:0; bottom:22px; background:var(--accent-bg); opacity:.5; transition:left .2s linear}
  .axis{position:absolute; left:0; right:0; bottom:0; height:22px; border-top:1px solid var(--line-soft); font-family:var(--mono); font-size:10px; color:var(--ink-faint)}
  .axis .t{position:absolute; bottom:4px; transform:translateX(-50%)}
  .req{position:absolute; width:11px; height:11px; border-radius:50%; bottom:34px; transform:translateY(8px) scale(.4); opacity:0;
       transition:transform .45s cubic-bezier(.2,.8,.2,1), opacity .3s, background .2s}
  .req.in{transform:none; opacity:1}
  .req.ok{background:var(--accent)} .req.blocked{background:var(--warn)}
  .readout{display:flex; gap:22px; margin-top:14px; flex-wrap:wrap}
  .ro{display:flex; flex-direction:column}
  .ro .rk{font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-faint)}
  .ro .rv{font-family:var(--display); font-size:24px; font-weight:600; line-height:1.1}
  .ro .rv.bad{color:var(--warn)} .ro .rv.good{color:var(--accent)}
  .simverdict{margin-top:16px; border-left:3px solid var(--line); padding:6px 0 6px 16px; font-size:14.5px; color:var(--ink-soft); transition:.2s}
  .simverdict.bad{border-color:var(--warn)} .simverdict.good{border-color:var(--accent)}
  .simverdict b{color:var(--ink); font-weight:600}

  /* own it */
  textarea{width:100%; font-family:var(--sans); font-size:14.5px; color:var(--ink); background:var(--panel);
    border:1.5px solid var(--line); border-radius:11px; padding:13px 15px; resize:vertical; min-height:84px; line-height:1.55}
  textarea:focus{outline:none; border-color:var(--accent)}
  .reflect{display:grid; gap:10px; margin-top:6px}
  .reflect .r{display:flex; gap:12px; align-items:baseline}
  .reflect .r .rl{font-family:var(--mono); font-size:11px; color:var(--ink-faint); flex:none; width:104px; text-transform:uppercase; letter-spacing:.06em}
  .reflect .r .rt{font-size:14.5px}
  .done-seal{display:inline-flex; align-items:center; gap:10px; font-family:var(--display); font-size:18px; font-weight:600; color:var(--accent); margin-top:8px}

  /* ---------- right margin: decisions + history ---------- */

<script>
/* ============================ STATE ============================

const S = {

  guess:null, committed:false,
  ranSim:false, simMode:'fixed', simResult:null,
  ownChoice:null, _reason:'', reflectionShown:false,
  path:[], adrs:[], decisions:{}
};
/* Wipe the interaction state that is scoped to one module (called on switch). */
function resetModuleState(){
  S.chapter=0; S.maxUnlocked=0; S.zoomReached='context';
  S.flowStep=0; S.guess=null; S.committed=false;
  S.ranSim=false; S.simMode='fixed'; S.simResult=null;
  S.ownChoice=null; S._reason=''; S.reflectionShown=false;
  S.fixPick=null; S._traceBeat=null;

}

/* ============================ C4 MODEL ============================

   - kind: 'person' | 'system' | 'container' | 'component'

const MODEL = {

    ],

/* The standalone Static/Flow scene toggle and the global FLOWS map are GONE

   beat carries its own `steps`, drawn as numbered hops over its module's scene

   reused from the trace renderer below, sourced from the beat — not a global. */

/* ============================ CURRICULUM (content) ============================
   THE ONE MOVE: lesson content is DATA, not welded into the render functions.
   A CURRICULUM bundles the shared C4 MODEL (the spatial backdrop, untouched in
   shape) with a list of MODULES — each a CONCEPT of rate limiting (windowing,
   storage, keying, failure, metrics, capstone), NOT a 1:1 C4 box. Every module

   (fog); Reveal zooms to `zoomTo`.

   and may hold several beats). A beat = {type, id?, ...payload}; the beat REGISTRY

   PLAYER renders any module. The gate is SLOT-OWNED: a confront-legal beat reports

   reveal={reveal}; practice={breakit,trace,fixit}; own={decide,callback}. The
   'trace' beat folds the dynamic/flow view IN (Q11): its `steps` are drawn as

   stay generic.                                                                */
const CURRICULUM = {

  MODEL,            // the existing C4 backdrop, shared across all six modules

          title:'Your instinct, met with reality.',
          lede:'No answer here is “dumb” — each trades something. Here’s what you reached for, against what production systems converge on.',

            fixed:{big:'The common first answer.', p:'A resetting counter is clean and fast — and it has one famous hole you’ll break on purpose in a moment.', good:false},

/* ============================ PLAYER ENGINE ============================
   A single CURRICULUM is played by ONE generic player. The active module is an
   INDEX into CURRICULUM.modules; a temporary dev <select> (Step 2) lets the
   verifier switch modules until the real map ships in Step 3. */
let activeIndex = 0;
function activeModule(){ return CURRICULUM.modules[activeIndex]; }

/* A module's slot order is engine-enforced, but practice/own are optional and
   may be absent — so the player derives the present slots PER MODULE. Each
   chapter index maps to one present slot; beats inside a slot array (practice/
   own) are flattened so multi-beat slots render as consecutive chapters that
   stay grouped under the slot label. */
const SLOT_ORDER = ['orient','confront','reveal','practice','own'];
const SLOT_META = {
  orient:{k:'Orient',   sub:'Map the territory'},
  confront:{k:'Confront', sub:'Try it before you’re told'},
  reveal:{k:'Reveal',   sub:'See the why'},
  practice:{k:'Practice', sub:'Break it on purpose'},
  own:{k:'Own it',     sub:'Make the call'}
};
/* Flat list of {slot, beat} for the active module, in enforced order. */
function moduleBeats(){
  const m=activeModule(), out=[];
  SLOT_ORDER.forEach(slot=>{
    const v=m.slots[slot]; if(!v) return;
    (Array.isArray(v)?v:[v]).forEach(beat=>out.push({slot, beat}));
  });
  return out;
}
function beatAt(i){ const b=moduleBeats()[i]; return b?b.beat:null; }
function slotAt(i){ const b=moduleBeats()[i]; return b?b.slot:null; }

const ZORDER = ['context','container','component'];
const ZNAME  = {context:'System Context', container:'Container', component:'Component'};
/* Per-chapter zoom is derived from the module's scene (not a hardcoded map):
   orient + confront sit at scene.level; reveal and everything after sit at
   scene.zoomTo (defaults to scene.level). */
function chapZoom(i){
  const m=activeModule(), sc=m.scene;
  return i>=2 ? (sc.zoomTo||sc.level) : sc.level;
}

const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
// C4 "person" marker: a small head+shoulders badge in the node's top-left,
// drawn in SVG frame coordinates so its size is predictable (no scaling blowup).
function personBadge(n){
  // top-left corner of the box; name gets pushed right via padding so no overlap
  const cx=n.x+30, cy=n.y+26, hr=9;
  return `<g class="c4pbadge">
    <circle cx="${cx}" cy="${cy-5}" r="${hr}"/>
    <path d="M ${cx-14} ${cy+18} a 14 14 0 0 1 28 0" stroke-linecap="round"/>
  </g>`;
}
function typeLabel(n){
  if(n.kind==='person') return 'Person';
  if(n.kind==='system') return 'Software System';
  if(n.kind==='container') return n.tech?`Container: ${n.tech}`:'Container';
  if(n.kind==='component') return n.tech?`Component: ${n.tech}`:'Component';
  return '';
}
/* FOCUS-DIMMING (Q10): when the active module's scene declares focus ids, the
   in-scope boxes that AREN'T focus render dimmed/greyed (fog) and focus boxes
   get a highlight ring. External actors are never dimmed (they're context, not
   the subject). focus is a Set; empty/absent = everything reads normally. */
function nodeSVG(n, focus){
  const isFocus = focus && focus.size && focus.has(n.id);
  const isDim   = focus && focus.size && !focus.has(n.id) && n.scope!=='ext';
  const cls=['c4node', n.scope==='ext'?'ext':'', n.kind==='person'?'person':'',
             n.store?'store':'', (n.into||n.adr)?'hot':'',
             isFocus?'focus':'', isDim?'dim':''].filter(Boolean).join(' ');
  const handler = n.into? `onclick="zoomTo('${n.into}')"` : (n.adr? `onclick="flashAdr('${n.adr}')"`:'');
  const hint = n.into? `<div class="c4hint">${esc(n.hint||'click to zoom in ↘')}</div>`
             : (n.adr? `<div class="c4hint">why? ↘</div>`:'');
  const inner = `<div class="${cls}${n.kind==='person'?' haspers':''}" ${handler}>
        <div class="c4name">${esc(n.name)}</div>
        <div class="c4type">[${esc(typeLabel(n))}]</div>
        ${n.desc?`<div class="c4desc">${esc(n.desc)}</div>`:''}
        ${hint}
      </div>`;
  return `<foreignObject class="c4fo" data-node="${n.id}" data-scope="${n.scope}" x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h+60}">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:${n.w}px;min-height:${n.h}px">${inner}</div>
  </foreignObject>`;
}
function center(n){return {x:n.x+n.w/2, y:n.y+n.h/2};}
// edge endpoints clipped to box borders so the dashed line meets the rectangle edge
function clipToBox(n,tx,ty){
  const c=center(n), dx=tx-c.x, dy=ty-c.y;
  const hw=n.w/2, hh=n.h/2;
  const sx=dx?hw/Math.abs(dx):Infinity, sy=dy?hh/Math.abs(dy):Infinity;
  const t=Math.min(sx,sy);
  return {x:c.x+dx*t, y:c.y+dy*t};
}
// the dashed line only (drawn UNDER the nodes)
function edgeLine(e,byId){
  const a=byId[e.from], b=byId[e.to]; if(!a||!b) return '';
  const ca=center(a), cb=center(b);
  const p1=clipToBox(a,cb.x,cb.y), p2=clipToBox(b,ca.x,ca.y);
  return `<path class="edge" d="M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}" marker-end="url(#c4ah)"/>`;
}
// rect (cx,cy centre + w,h) vs box overlap area — 0 means clear
function rectBoxOverlap(cx,cy,w,h,n){
  const ox=Math.max(0, Math.min(cx+w/2,n.x+n.w)-Math.max(cx-w/2,n.x));
  const oy=Math.max(0, Math.min(cy+h/2,n.y+n.h)-Math.max(cy-h/2,n.y));
  return ox*oy;
}
// the label chip only (drawn OVER the nodes, so it is never hidden behind a box).
// A chip dropped at the geometric midpoint can land on a box border when nodes
// sit close together. So we search positions ALONG the edge (t) and PERPENDICULAR
// to it (off) and keep the one that overlaps the fewest boxes, nearest the middle.
function edgeLabel(e,byId){
  const a=byId[e.from], b=byId[e.to]; if(!a||!b||!(e.label||e.tech)) return '';
  const ca=center(a), cb=center(b);
  const p1=clipToBox(a,cb.x,cb.y), p2=clipToBox(b,ca.x,ca.y);
  const lbl=esc(e.label||''), tech=e.tech?`[${esc(e.tech)}]`:'';
  const w=Math.max(lbl.length*7.8, tech.length*7.4)+16, h=tech?40:24;
  const dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.hypot(dx,dy)||1;
  const px=-dy/len, py=dx/len;             // unit perpendicular
  // ALL boxes count — on short edges the chip is wider than the gap and bleeds
  // into the connected boxes too, so we still need to lift it off the edge line.
  const all=Object.values(byId);
  let best=null;
  // bias HARD toward t=.5 / off=0 so the chip hugs its arrow; only push it off
  // the line when it genuinely can't sit on the arrow without covering a box.
  for(const t of [.5,.42,.58,.34,.66,.27,.73,.2,.8]){
    for(const off of [0, h, -h, h*2, -h*2, h*3, -h*3, h*4, -h*4, h*5, -h*5]){
      const cx=p1.x+dx*t+px*off, cy=p1.y+dy*t+py*off;
      let area=0; for(const n of all) area+=rectBoxOverlap(cx,cy,w,h,n);
      const cost=area + Math.abs(t-.5)*240 + Math.abs(off)*1.6;
      if(!best||cost<best.cost) best={cx,cy,cost,area};
      if(area===0) break;                  // clear hit — take the most central one
    }
    if(best&&best.area===0) break;
  }
  const mx=best.cx, my=best.cy;
  return `<rect class="edgebg" x="${mx-w/2}" y="${my-h/2}" width="${w}" height="${h}" rx="7"/>
    ${lbl?`<text class="edgelbl" x="${mx}" y="${my+(tech?-2:5)}" text-anchor="middle">${lbl}</text>`:''}
    ${tech?`<text class="edgetech" x="${mx}" y="${my+15}" text-anchor="middle">${tech}</text>`:''}`;
}
function sceneSVG(zid, focusIds){
  const m=MODEL[zid];
  const focus=new Set(focusIds||[]);
  const byId={}; m.nodes.forEach(n=>byId[n.id]=n);
  // boundary box wraps the in-scope nodes (extra top room for its [type] line)
  let bound='';
  if(m.boundary){
    const ins=m.nodes.filter(n=>n.scope==='in');
    const minX=Math.min(...ins.map(n=>n.x))-34, minY=Math.min(...ins.map(n=>n.y))-86;
    const maxX=Math.max(...ins.map(n=>n.x+n.w))+34, maxY=Math.max(...ins.map(n=>n.y+n.h))+32;
    bound=`<rect class="c4bound" data-bound x="${minX}" y="${minY}" width="${maxX-minX}" height="${maxY-minY}" rx="24"/>
      <text class="c4boundlbl" data-boundlbl x="${minX+26}" y="${minY+40}">${esc(m.boundary.name)}</text>
      <text class="c4boundtype" data-boundtype x="${minX+26}" y="${minY+62}">[${esc(m.boundary.type)}]</text>`;
  }
  // paint order: boundary -> edge lines -> nodes -> edge labels (labels always on top)
  return `<svg viewBox="0 0 ${FRAME_W} ${FRAME_H}">${C4DEFS}
    ${bound}
    ${m.edges.map(e=>edgeLine(e,byId)).join('')}
    ${m.nodes.map(n=>nodeSVG(n,focus)).join('')}
    ${m.nodes.filter(n=>n.kind==='person').map(personBadge).join('')}
    ${m.edges.map(e=>edgeLabel(e,byId)).join('')}
  </svg>`;
}
/* The active module's focus set FOR a given level — only applies focus when that
   level matches the module's scene level (focus ids are level-specific). */
function focusFor(zid){
  const sc=activeModule().scene;
  return (sc && (zid===sc.level || zid===(sc.zoomTo||sc.level))) ? (sc.focus||[]) : [];
}
const C4DEFS=`<defs><marker id="c4ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1.5L8 5L2 8.5" fill="none" stroke="var(--ink-faint)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="fah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 1.5L8 5L2 8.5" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;

function c4Title(zid){const m=MODEL[zid]; return `${ZNAME[zid]} diagram · ${esc(m.scope)}`;}
function c4Legend(zid){
  const m=MODEL[zid];
  const has=k=>m.nodes.some(n=>(k==='person'?n.kind==='person':k==='ext'?(n.scope==='ext'&&n.kind!=='person'):n.scope==='in'));
  const items=[];
  if(has('in')) items.push(`<span><i class="lg-in"></i>in scope</span>`);
  if(has('ext')) items.push(`<span><i class="lg-ext"></i>external</span>`);
  if(has('person')) items.push(`<span><i class="lg-person"></i>person</span>`);
  if(m.boundary) items.push(`<span><i class="lg-bound"></i>boundary</span>`);
  items.push(`<span><i class="lg-rel"></i>relationship →</span>`);
  return items.join('');
}
/* ---- Dynamic (flow) view ---- */
// straight edge between two container nodes, clipped to their borders, with an
// optional perpendicular offset so two steps on the same pair don't overlap.
function flowEdgePath(a,b,off){
  const ca=center(a), cb=center(b);
  let p1=clipToBox(a,cb.x,cb.y), p2=clipToBox(b,ca.x,ca.y);
  if(off){
    // perpendicular from a CANONICAL direction (lower id -> higher id) so a
    // request and its response fan to opposite lanes instead of cancelling.
    const lo = a.id<b.id? ca:cb, hi = a.id<b.id? cb:ca;
    const dx=hi.x-lo.x, dy=hi.y-lo.y, len=Math.hypot(dx,dy)||1;
    const nx=-dy/len*off, ny=dx/len*off;
    p1={x:p1.x+nx,y:p1.y+ny}; p2={x:p2.x+nx,y:p2.y+ny};
  }
  return {p1,p2,mx:(p1.x+p2.x)/2,my:(p1.y+p2.y)/2};
}
// for each step, decide a perpendicular offset: if another step links the same
// pair of nodes, fan them into separate lanes (e.g. a request + its response).
function flowOffsets(steps){
  const key=s=>[s.from,s.to].sort().join('|');
  const groups={}; steps.forEach((s,i)=>{ (groups[key(s)]=groups[key(s)]||[]).push(i); });
  const off=new Array(steps.length).fill(0);
  Object.values(groups).forEach(idxs=>{
    if(idxs.length<2) return;
    const spread=46;
    idxs.forEach((idx,k)=>{ off[idx]=(k-(idxs.length-1)/2)*spread; });
  });
  return off;
}
/* ---- TRACE beat (folds the dynamic/flow view in, Q11) ----
   The trace beat carries its own `steps` and renders them as numbered hops over
   ITS module's scene level (a self-contained flow block; no Static/Flow toggle).
   flowSVG/flowStepList take an explicit (level, steps) pair sourced from the
   beat, reusing the numbered-steps-over-boxes + lane-separation rendering. */
function flowSVG(zid, steps){
  const m=MODEL[zid];
  if(!steps||!steps.length){ return `<svg viewBox="0 0 ${FRAME_W} ${FRAME_H}">${C4DEFS}</svg>`; }
  const byId={}; m.nodes.forEach(n=>byId[n.id]=n);
  const nodes=m.nodes.map(n=>{
    const cls=['c4node', n.scope==='ext'?'ext':'', n.kind==='person'?'person':'', n.store?'store':''].filter(Boolean).join(' ');
    return `<foreignObject class="flowfo" data-fnode="${n.id}" x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h+60}">
      <div xmlns="http://www.w3.org/1999/xhtml" style="width:${n.w}px;min-height:${n.h}px">
        <div class="${cls}${n.kind==='person'?' haspers':''}"><div class="c4name">${esc(n.name)}</div><div class="c4type">[${esc(typeLabel(n))}]</div>${n.desc?`<div class="c4desc">${esc(n.desc)}</div>`:''}</div>
      </div></foreignObject>`;
  }).join('');
  const offs=flowOffsets(steps);
  const arcs=steps.map((s,i)=>{
    const a=byId[s.from], b=byId[s.to]; if(!a||!b) return '';
    const {p1,p2,mx,my}=flowEdgePath(a,b,offs[i]);
    return `<g data-fstep="${i}">
      <path class="flowedge" d="M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}" marker-end="url(#fah)"/>
      <circle class="flownum-bg" cx="${mx}" cy="${my}" r="16"/>
      <text class="flownum" x="${mx}" y="${my+6}" text-anchor="middle">${i+1}</text>
    </g>`;
  }).join('');
  return `<svg viewBox="0 0 ${FRAME_W} ${FRAME_H}">${C4DEFS}
    ${arcs}
    ${nodes}
    ${m.nodes.filter(n=>n.kind==='person').map(personBadge).join('')}
  </svg>`;
}
function flowStepList(zid, steps){
  const m=MODEL[zid]; if(!steps||!steps.length) return '';
  const byId={}; m.nodes.forEach(n=>byId[n.id]=n);
  return `<ol class="flowsteps" id="flowsteps">${steps.map((s,i)=>`
    <li data-step="${i}" onclick="flowGo(${i})">
      <span class="sn">${i+1}</span>
      <span><b>${esc(byId[s.from].name)} → ${esc(byId[s.to].name)}</b> · ${esc(s.label)}
      ${s.tech?` <span class="tech">[${esc(s.tech)}]</span>`:''}</span>
    </li>`).join('')}</ol>`;
}
/* Static, zoomable C4 block. Focus ids dim the fog and ring the subject (Q10).
   The Static/Flow toggle is gone; the dynamic view lives in the trace beat. */
function c4Block(){
  return `<div class="diagram">
    <div class="c4topbar">
      <div class="c4title" id="c4title">${c4Title(S.zoom)}</div>
    </div>
    <div class="crumbs" id="crumbs"></div>
    <div class="scene-wrap" id="scenewrap">
      <div class="scene" data-z="context">${sceneSVG('context', focusFor('context'))}</div>
      <div class="scene" data-z="container">${sceneSVG('container', focusFor('container'))}</div>
      <div class="scene" data-z="component">${sceneSVG('component', focusFor('component'))}</div>
    </div>
    <div class="legend" id="c4legend">${c4Legend(S.zoom)}</div>
  </div>`;
}

function paintCrumbs(){
  const cr=document.getElementById('crumbs'); if(!cr) return;
  const idx=ZORDER.indexOf(S.zoom);
  let html='';
  ZORDER.forEach((z,i)=>{
    if(i>0) html+=`<span class="sep">›</span>`;
    const reachable=i<=ZORDER.indexOf(S.zoomReached);
    html+=`<button class="${z===S.zoom?'on':''}" ${reachable&&!zooming?`onclick="zoomTo('${z}')"`:'disabled'}>${ZNAME[z]}</button>`;
  });
  html+=`<span class="spacer"></span>`;
  if(idx>0) html+=`<button class="zoutbtn" ${zooming?'disabled':''} onclick="zoomTo('${ZORDER[idx-1]}')">↖ zoom out</button>`;
  cr.innerHTML=html;
  const t=document.getElementById('c4title'); if(t) t.textContent=c4Title(S.zoom);
  const lg=document.getElementById('c4legend'); if(lg) lg.innerHTML=c4Legend(S.zoom);
}

/* A zoom anchor = the box (in the OUTER level) that the INNER level lives inside.
   Derived from MODEL: find, in the outer level, the node whose `into` is this
   inner level. cx/cy = that box's centre as a fraction of the frame. */
function anchorForInner(innerId){
  for(const zid of ZORDER){
    const host=MODEL[zid].nodes.find(n=>n.into===innerId);
    if(host){
      const s=Math.min(3.2, Math.max(2.5, FRAME_W/host.w));
      return {cx:(host.x+host.w/2)/FRAME_W, cy:(host.y+host.h/2)/FRAME_H, s};
    }
  }
  return {cx:.5, cy:.5, s:2.8};
}
const ANCHOR = {
  container: anchorForInner('container'),
  component: anchorForInner('component')
};
let zooming=false;
const reducedM = ()=>window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function sceneEl(z){ return document.querySelector(`#scenewrap .scene[data-z="${z}"]`); }
function setPose(el,p,animate){
  if(!animate) el.style.transition='none';
  el.style.transformOrigin=`${p.ox*100}% ${p.oy*100}%`;
  el.style.transform = p.scale===1?'none':`scale(${p.scale})`;
  el.style.opacity=p.opacity;
  if(!animate){ void el.offsetWidth; el.style.transition=''; }
}
function settleActive(z){
  document.querySelectorAll('#scenewrap .scene').forEach(e=>{
    const on=e.dataset.z===z;
    e.style.transition='none';
    e.style.transform='none'; e.style.transformOrigin='0 0'; e.style.opacity=on?1:0;
    e.style.pointerEvents=on?'auto':'none'; e.style.zIndex=on?2:0;
    void e.offsetWidth; e.style.transition='';
  });
}
/* A foreignObject CLIPS anything past its height. Boxes use min-height and grow
   when text wraps, so the declared n.h+60 can be too short -> the hint/desc gets
   cut off (e.g. "why?" sliced in half). Measure each box's real content height
   after mount and grow its foreignObject to match, so nothing is ever clipped. */
function fitNodes(){
  document.querySelectorAll('#scenewrap foreignObject.c4fo, #scenewrap foreignObject.flowfo').forEach(fo=>{
    const inner=fo.firstElementChild; if(!inner) return;
    const h=inner.offsetHeight;
    if(h>parseFloat(fo.getAttribute('height'))) fo.setAttribute('height', h+4);
  });
}
/* `.scene` carries will-change:transform, so Chrome promotes it to a GPU layer
   and rasters it ONCE — at fallback-font sizes, before web fonts load. Growing a
   <foreignObject> afterwards updates layout but NOT that cached bitmap, so text
   still paints clipped at the old height. Toggling will-change off/on drops and
   re-creates the layer, forcing a fresh raster at the corrected geometry. */
function repaintScenes(){
  document.querySelectorAll('#scenewrap .scene').forEach(s=>{
    const wc=s.style.willChange;
    s.style.willChange='auto'; void s.offsetWidth; s.style.willChange=wc||'';
  });
}
/* Boxes use min-height and grow when text wraps, so their RENDERED height can
   exceed the declared n.h. Recompute each boundary from the actual mounted box
   geometry so a component can never leak outside its container boundary. */
const PAD={x:34, top:86, bot:32};
function fitBoundaries(){
  document.querySelectorAll('#scenewrap .scene').forEach(scene=>{
    const rect=scene.querySelector('rect.c4bound'); if(!rect) return;
    const ins=[...scene.querySelectorAll('foreignObject[data-scope="in"]')];
    if(!ins.length) return;
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    ins.forEach(fo=>{
      const x=parseFloat(fo.getAttribute('x')), y=parseFloat(fo.getAttribute('y'));
      const w=parseFloat(fo.getAttribute('width'));
      const inner=fo.firstElementChild;
      const h=inner?inner.offsetHeight:parseFloat(fo.getAttribute('height'));
      minX=Math.min(minX,x); minY=Math.min(minY,y);
      maxX=Math.max(maxX,x+w); maxY=Math.max(maxY,y+h);
    });
    const bx=minX-PAD.x, by=minY-PAD.top, bw=(maxX+PAD.x)-(minX-PAD.x), bh=(maxY+PAD.bot)-(minY-PAD.top);
    rect.setAttribute('x',bx); rect.setAttribute('y',by);
    rect.setAttribute('width',bw); rect.setAttribute('height',bh);
    const lbl=scene.querySelector('text[data-boundlbl]'), typ=scene.querySelector('text[data-boundtype]');
    if(lbl){ lbl.setAttribute('x',bx+26); lbl.setAttribute('y',by+40); }
    if(typ){ typ.setAttribute('x',bx+26); typ.setAttribute('y',by+62); }
  });
}
function initC4(){
  if(!document.getElementById('scenewrap')) return;
  fitNodes(); fitBoundaries();
  settleActive(S.zoom); paintCrumbs();
  // Web fonts load async; the first fit measures with the fallback font (shorter),
  // so text re-wraps taller once the real font arrives and clips again. Re-fit then.
  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(()=>{ fitNodes(); fitBoundaries(); repaintScenes(); });
  }
}

/* ---- TRACE beat playback (Q11): the dynamic/flow view, now sourced from the
   active trace beat's `steps` over its module scene level, rendered inline in
   the trace pane (#tracewrap). No global flow level, no Static/Flow toggle. */
let flowTimer=null;
function curTrace(){ return S._traceBeat||null; }
function traceLevel(){ const sc=activeModule().scene; return sc.zoomTo||sc.level; }
function mountTrace(beat){
  S._traceBeat=beat; S.flowStep=0;
  const lvl=traceLevel();
  const wrap=document.getElementById('tracewrap'); if(wrap) wrap.innerHTML=flowSVG(lvl, beat.steps);
  const lw=document.getElementById('flowlistwrap'); if(lw) lw.innerHTML=flowStepList(lvl, beat.steps);
  fitTraceNodes();
  renderFlowStep();
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(()=>fitTraceNodes()); }
}
function fitTraceNodes(){
  document.querySelectorAll('#tracewrap foreignObject.flowfo').forEach(fo=>{
    const inner=fo.firstElementChild; if(!inner) return;
    const h=inner.offsetHeight;
    if(h>parseFloat(fo.getAttribute('height'))) fo.setAttribute('height', h+4);
  });
}
function renderFlowStep(){
  const scene=document.querySelector('#tracewrap svg'); if(!scene) return;
  const f=curTrace(); if(!f) return;
  scene.querySelectorAll('g[data-fstep]').forEach(g=>{
    const i=+g.dataset.fstep;
    const edge=g.querySelector('.flowedge'), bg=g.querySelector('.flownum-bg');
    edge.classList.toggle('active', i===S.flowStep); edge.classList.toggle('seen', i<S.flowStep);
    bg.classList.toggle('active', i===S.flowStep); bg.classList.toggle('seen', i<S.flowStep);
  });
  const cur=f.steps[S.flowStep];
  scene.querySelectorAll('.flowfo').forEach(fo=>{
    fo.classList.toggle('lit', fo.dataset.fnode===cur.from || fo.dataset.fnode===cur.to);
  });
  document.querySelectorAll('#flowsteps li').forEach(li=>{
    const i=+li.dataset.step;
    li.classList.toggle('active', i===S.flowStep); li.classList.toggle('seen', i<S.flowStep);
  });
  const of=document.getElementById('flowof'); if(of) of.textContent=`Step ${S.flowStep+1} of ${f.steps.length}`;
  const pv=document.getElementById('flowprev'), nx=document.getElementById('flownext');
  if(pv) pv.disabled=S.flowStep===0; if(nx) nx.disabled=S.flowStep===f.steps.length-1;
}
function flowStep(d){ const f=curTrace(); if(!f) return; const n=S.flowStep+d; if(n<0||n>=f.steps.length) return; S.flowStep=n; renderFlowStep(); }
function flowGo(i){ stopFlowPlay(); S.flowStep=i; renderFlowStep(); }
function stopFlowPlay(){ if(flowTimer){ clearInterval(flowTimer); flowTimer=null; const b=document.getElementById('flowplay'); if(b) b.textContent='▶ Play'; } }
function flowPlay(){
  const f=curTrace(); if(!f) return; const b=document.getElementById('flowplay');
  if(flowTimer){ stopFlowPlay(); return; }
  if(S.flowStep>=f.steps.length-1) S.flowStep=0;
  renderFlowStep(); b.textContent='❚❚ Pause';
  flowTimer=setInterval(()=>{
    if(S.flowStep>=f.steps.length-1){ stopFlowPlay(); return; }
    S.flowStep++; renderFlowStep();
  }, 1100);
}

/* One adjacent hop. The clicked box grows to fill the frame (and the detail unfolds
   from inside it); zoom-out is the exact reverse, collapsing the detail back into its box.
   Both scenes pivot about the SAME point, so the eye never loses the spot. */
function zoomStep(fromZ,toZ,done){
  const iF=ZORDER.indexOf(fromZ), iT=ZORDER.indexOf(toZ);
  const A=ANCHOR[ZORDER[Math.max(iF,iT)]];
  const goingIn=iT>iF;
  const shallow=sceneEl(ZORDER[Math.min(iF,iT)]);
  const deep=sceneEl(ZORDER[Math.max(iF,iT)]);
  if(!shallow||!deep||reducedM()){ settleActive(toZ); done&&done(); return; }
  document.querySelectorAll('#scenewrap .scene').forEach(e=>{ if(e!==shallow&&e!==deep){ e.style.opacity=0; e.style.pointerEvents='none'; e.style.zIndex=0; }});
  shallow.style.zIndex=2; deep.style.zIndex=2; shallow.style.pointerEvents='none'; deep.style.pointerEvents='none';
  if(goingIn){
    setPose(shallow,{scale:1,ox:A.cx,oy:A.cy,opacity:1},false);
    setPose(deep,{scale:1/A.s,ox:A.cx,oy:A.cy,opacity:0},false);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      setPose(shallow,{scale:A.s,ox:A.cx,oy:A.cy,opacity:0},true);
      setPose(deep,{scale:1,ox:A.cx,oy:A.cy,opacity:1},true);
    }));
  } else {
    setPose(deep,{scale:1,ox:A.cx,oy:A.cy,opacity:1},false);
    setPose(shallow,{scale:A.s,ox:A.cx,oy:A.cy,opacity:0},false);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      setPose(deep,{scale:1/A.s,ox:A.cx,oy:A.cy,opacity:0},true);
      setPose(shallow,{scale:1,ox:A.cx,oy:A.cy,opacity:1},true);
    }));
  }
  setTimeout(()=>{ settleActive(toZ); done&&done(); }, 640);
}

/* ADRs are no longer minted by zooming — they come from the active module's
   reveal/decide beats (each carries an authored `adr` key). Zoom is pure
   navigation now; the box's own `adr` (clicked) still flashes its record. */

/* Walks one hop at a time, so even a 2-level jump reads as a continuous flight. */
function zoomTo(z){
  if(zooming || !document.getElementById('scenewrap')) return;
  if(ZORDER.indexOf(z)>ZORDER.indexOf(S.zoomReached)) S.zoomReached=z;
  let i=ZORDER.indexOf(S.zoom); const j=ZORDER.indexOf(z);
  if(i===j){ paintCrumbs(); return; }
  const dir=j>i?1:-1, hops=[];
  while(i!==j){ hops.push([ZORDER[i],ZORDER[i+dir]]); i+=dir; }
  S.zoom=z; zooming=true; paintCrumbs();
  let k=0;
  (function run(){ if(k>=hops.length){ zooming=false; paintCrumbs(); return; } const [a,b]=hops[k++]; zoomStep(a,b,run); })();
}

/* ============================ DECISIONS ============================ */
const ADR_LIB = {
  a1:{id:'ADR-0001', title:'Sliding window over fixed window', pill:'accepted',
    rows:[['Context','Cap each user at <b>100 req/min</b>. A counter that resets on the minute is the obvious first build.'],
          ['Decision','Count the <b>trailing 60 seconds</b> (sliding) instead of a calendar-minute bucket.'],
          ['Alternatives','Fixed window — simplest, but a 2× burst across the boundary. Token bucket — smooth with intentional bursts; a fine swap.'],
          ['Consequence','Kills the boundary burst; a little more bookkeeping than a plain counter.']]},
  a2:{id:'ADR-0002', title:'Counters in Redis, not in memory', pill:'accepted',
    rows:[['Context','The limiter runs on many gateway instances; the tally must be shared and survive a restart.'],
          ['Decision','Keep counts in <b>Redis</b> with atomic INCR/EXPIRE.'],
          ['Alternatives','In-memory per instance — fastest, but the real ceiling becomes N×100. Sticky sessions — fragile when scaling.'],
          ['Consequence','One network hop on the hot path; a correct <b>global</b> limit. Pipeline / pre-check to soften the cost.']]},
  a3:{id:'ADR-0003', title:'What identifies a caller (the limit key)', pill:'accepted',
    rows:[['Context','The Key Resolver must decide whose budget a request spends — per user, per IP, or per route.'],
          ['Decision','Key the window by <b>resolved user ID</b> where authenticated, falling back to client IP for anonymous routes.'],
          ['Alternatives','IP only — simple but unfair behind NAT/office gateways. Route only — coarse, lets one user starve others.'],
          ['Consequence','Fair per-user budgets; needs identity resolved before the limiter runs on authed routes.']]},
  a4:{id:'ADR-0004', title:'Degrade to local counting on store failure', pill:'accepted',
    rows:[['Context','The shared counter store is a dependency on the hot path. When it is unreachable, the limiter must still answer every request.'],
          ['Decision','Fail to <b>per-instance local counts</b> with a tighter local cap until the store returns.'],
          ['Alternatives','Fail open — keeps the API up but exposes the backend. Fail closed — protects downstream but turns a blip into an outage.'],
          ['Consequence','Bounded at N×cap (not unbounded), self-heals when the store recovers; loses the exact global limit while degraded.']]},
  a5:{id:'ADR-0005', title:'Emit a labeled verdict counter', pill:'accepted',
    rows:[['Context','A silent limiter is indistinguishable from a broken one; you need to see who is being limited without logging every request.'],
          ['Decision','Increment an <b>allow/deny counter labeled by route and reason</b> on every verdict; sample structured logs for the denied tail.'],
          ['Alternatives','Log every request — total recall, overwhelming at scale. Nothing — you learn you are limiting only when a customer complains.'],
          ['Consequence','Cheap, alertable visibility in seconds; drill-down detail only where it pays.']]}
};
function addAdr(key){
  if(!ADR_LIB[key] || S.adrs.find(a=>a.key===key)) return;
  S.adrs.push({key, ...ADR_LIB[key]});
  renderMargin();
}
/* Record the learner's own decision, keyed by the decide beat's STABLE authored
   id (Q6) so it persists and can be referenced later. base = the ADR_LIB entry
   this call refines (for the headline + framing). */
function addMyAdr(beatId, base, choice, reason){
  const ref=ADR_LIB[base]||{};
  const obj={key:'mine:'+beatId, id:(ref.id||'ADR-XXXX')+' ·  you', title:`Your call: ${choice}`, pill:'your call', mine:true,
    rows:[['Context', (ref.rows&&ref.rows[0]&&ref.rows[0][1]) || 'A real decision the textbook leaves to you.'],
          ['Decision',`You chose <b>${esc(choice)}</b>.`],
          ['Your reason', reason && reason.trim() ? esc(reason.trim()) : '—']]};
  S.decisions[beatId]={choice, reason:reason||'', adr:base};
  const ex=S.adrs.find(a=>a.key===obj.key);
  if(ex) Object.assign(ex,obj); else S.adrs.push(obj);
  persist();
  renderMargin();
}
function flashAdr(key){
  if(ADR_LIB[key] && !S.adrs.find(a=>a.key===key)) addAdr(key);
  openMargin();
  setTimeout(()=>{
    const el=document.getElementById('adr-'+key);
    if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash'); }
  },60);
}
function logPath(text){ if(!S.path.includes(text)){ S.path.push(text); renderMargin(); } }

function renderMargin(){
  const p=document.getElementById('pathlist');
  p.innerHTML = S.path.length? S.path.map(t=>`<li>${t}</li>`).join('')
    : `<li class="empty">Nothing yet — start in Chapter 01.</li>`;

  a.innerHTML = S.adrs.length? S.adrs.map(d=>`
    <div class="adr" id="adr-${d.key}">
      <div class="ah"><span class="aid">${d.id}</span><span class="pill ${d.mine?'mine':''}">${d.pill}</span></div>
      <div class="at">${d.title}</div>
      <dl>${d.rows.map(r=>`<dt>${r[0]}</dt><dd>${r[1]}</dd>`).join('')}</dl>
    </div>`).join('')
    : `<div class="madr-empty">No decisions recorded yet.<br>Each chapter adds one.</div>`;
  const n=S.adrs.length;
  const dm=document.getElementById('decCountM'); if(dm) dm.textContent=n;
}

/* ============================ CHAPTER CONTENT ============================
   "Chapters" are now the active module's flattened beats (one per chapter). The
   rail labels group by slot; consecutive beats in the same slot share a label.  */
function render(){
  const beats=moduleBeats();
  const cur=beats[S.chapter]||beats[0];
  // rail
  const cl=document.getElementById('chaplist');
  cl.innerHTML = beats.map((b,i)=>{
    const meta=SLOT_META[b.slot];
    const st = i===S.chapter?'active' : (i<=S.maxUnlocked? (i<S.chapter?'done':'idle') : 'locked');
    const on = (i<=S.maxUnlocked && i!==S.chapter)?1:0;
    const done = i<S.chapter || (i<S.maxUnlocked&&i!==S.chapter);
    return `<div class="chap" data-state="${st}" data-on="${on}" ${on?`onclick="go(${i})"`:''}>
      <div class="dot">${done?'✓':String(i+1).padStart(2,'0')}</div>
      <div class="ct"><div class="ck">${meta.sub}</div><div class="cn">${meta.k}</div></div>
    </div>`;
  }).join('');
  // header + rail framing (all module-driven, no hardcoded copy)
  const m=activeModule();
  const curMeta=SLOT_META[cur.slot];
  document.getElementById('kicker').textContent = `${m.label} · ${String(S.chapter+1).padStart(2,'0')} · ${curMeta.k}`;
  const rl=document.getElementById('railLesson'); if(rl) rl.textContent=m.label;
  const rs=document.getElementById('railSub'); if(rs) rs.textContent=m.kick+' — '+m.desc;
  const rf=document.getElementById('railFoot'); if(rf) rf.innerHTML=`${beats.length} chapters · ${m.capstone?'capstone — all your calls':'productive failure + C4 zoom'}<br>focus: ${(m.scene.focus||[]).join(', ')||'—'} @ ${ZNAME[m.scene.level]}<br>every choice → a decision record`;
  document.getElementById('barfill').style.width = (beats.length>1?(S.chapter)/(beats.length-1)*100:100)+'%';
  // stage — render the current beat through the type REGISTRY
  const renderer=BEAT_REGISTRY[cur.beat.type] || (()=>`<p class="lede">Unknown beat: ${esc(cur.beat.type)}</p>`);
  document.getElementById('panes').innerHTML = `<div class="pane" key="${activeIndex}-${S.chapter}">${renderer(cur.beat)}</div>`;
  // per-chapter C4 zoom is derived from the module scene (not a hardcoded map)
  if(document.getElementById('scenewrap')){
    if(S._lastChap!==S.chapter){
      if(typeof stopFlowPlay==='function') stopFlowPlay();
      const z=chapZoom(S.chapter);
      S.zoom=z;
      if(ZORDER.indexOf(z)>ZORDER.indexOf(S.zoomReached)) S.zoomReached=z;
    }
    initC4();
  }
  if(cur.beat.type==='trace'){ stopFlowPlay(); mountTrace(cur.beat); }
  if(cur.beat.type==='breakit') wireSim();
  S._lastChap=S.chapter;
  renderMargin();
}

/* ============================ BEAT REGISTRY ============================
   type -> renderer(beat). Each renderer reads ONLY its beat object (content
   data), so the same engine plays any module. Slot legality (Q7) and the
   slot-owned gate are enforced by the engine, not these renderers. The seven
   beat types Step 2 implements:
     orient   (orient slot)
     quiz     (confront-legal: reports a commit)
     reveal   (consumes the committed guess)
     breakit  (practice: the windowing burst simulator)
     trace    (practice: the folded-in dynamic/flow view, Q11)
     fixit    (practice: read broken code, pick the fix)
     decide   (own: write your own ADR)                                         */
const BEAT_REGISTRY = {
  orient:   paneOrient,
  quiz:     paneConfront,
  reveal:   paneReveal,
  breakit:  panePractice,
  trace:    paneTrace,
  fixit:    paneFixit,
  decide:   paneOwn
};
/* The active module's confront choices — re-read live so reveal/path helpers
   resolve against whatever module is playing. */
function curChoices(){ return activeModule().slots.confront.choices; }

/* Engine navigation is generic now: a beat's "continue" button just calls
   advance() to the NEXT chapter, so panes never hardcode a chapter index.     */
function continueBtn(b, hint){
  return `<div class="actions">
    <button class="btn" onclick="advance()">${esc(b.cta||'Continue')} <span class="arr">→</span></button>
    ${hint?`<span class="hint">${hint}</span>`:''}
  </div>`;
}

function paneOrient(b){
  return `
  <h1 class="title">${b.title}</h1>
  <p class="lede">${b.lede}</p>
  ${b.scene?c4Block():''}
  ${b.note?`<p class="hint" style="margin-top:14px">${b.note}</p>`:''}
  ${continueBtn(b, b.hint)}`;
}

function paneConfront(b){
  const committed=S.committed;
  return `
  <h1 class="title">${b.title}</h1>
  <p class="lede">${b.lede}</p>
  <div class="card">
    <div class="label">${b.prompt}</div>
    ${Object.entries(b.choices).map(([k,c])=>`
      <button class="choice" aria-pressed="${S.guess===k}" ${committed?'disabled':''} onclick="pick('${k}')">
        <span class="pick"></span>
        <span class="ctxt"><b>${c.t}</b><span>${c.d}</span></span>
      </button>`).join('')}
  </div>
  ${committed? continueBtn(b, b.committedHint)
   : `<div class="locknote">${b.lockNote}</div>`}
  `;
}

function paneReveal(b){
  const choices=curChoices();
  const g=(S.guess && choices[S.guess])?S.guess:Object.keys(choices)[0];
  const v=b.verdicts[g];
  return `
  <h1 class="title">${b.title}</h1>
  <p class="lede">${b.lede}</p>
  <div class="verdict">
    <div class="vcell you">
      <div class="vh">You reached for</div>
      <p class="big">${choices[g].t}</p>
      <p>${v.big} ${v.p}</p>
    </div>
    <div class="vcell real">
      <div class="vh">Where it lands</div>
      <p class="big">${b.realTitle}</p>
      <p>${b.realBody}</p>
    </div>
  </div>
  ${b.afterScene?`<p class="lede" style="margin-top:18px">${b.afterScene}</p>`:''}
  ${b.scene?c4Block():''}
  ${continueBtn(b, b.hint)}`;
}

/* PRACTICE · breakit — the windowing burst simulator (unchanged behaviour). */
function panePractice(b){
  return `
  <h1 class="title">${b.title}</h1>
  <p class="lede">${b.lede}</p>
  <div class="card sim">
    <div class="simbar">
      <span class="label" style="margin:0">Windowing</span>
      <div class="seg" id="simseg">
        <button data-m="fixed" class="on" onclick="setSim('fixed')">Fixed window</button>
        <button data-m="sliding" onclick="setSim('sliding')">Sliding window</button>
      </div>
      <button class="btn ghost" id="firebtn" onclick="fireBurst()">▶ Fire 200 across the boundary</button>
    </div>
    <div class="track" id="track">
      <div class="window" id="simwin"></div>
      <div class="boundary"><span>minute resets →</span></div>
      <div class="axis"><span class="t" style="left:25%">:30</span><span class="t" style="left:50%">:00</span><span class="t" style="left:75%">:30</span></div>
    </div>
    <div class="readout">
      <div class="ro"><span class="rk">Allowed in ~2s</span><span class="rv" id="roAllow">—</span></div>
      <div class="ro"><span class="rk">Intended ceiling</span><span class="rv">100</span></div>
      <div class="ro"><span class="rk">Verdict</span><span class="rv" id="roVerdict">—</span></div>
    </div>
    <div class="simverdict" id="simnote">Pick a mode and fire a burst. Watch the boundary.</div>
  </div>
  ${b.afterSim?`<p class="lede" style="margin-top:20px">${b.afterSim}</p>`:''}
  ${b.scene?c4Block():''}
  ${continueBtn(b, S.ranSim?'You’ve seen the failure mode. ✓':'Try firing in both modes first.')}`;
}

/* PRACTICE · trace — the folded-in dynamic/flow view (Q11). Numbered steps over
   the module scene level, driven by the beat's own `steps`. mountTrace() (called
   from render) injects the SVG + step list into #tracewrap / #flowlistwrap. */
function paneTrace(b){
  return `
  <h1 class="title">${b.title}</h1>
  <p class="lede">${b.lede}</p>
  <div class="diagram">
    <div class="c4topbar"><div class="c4title">Trace · ${esc(ZNAME[traceLevel()])} · one request</div></div>
    <div class="scene-wrap" id="tracewrap"></div>
    <div class="flowctl">
      <button id="flowprev" onclick="flowStep(-1)">‹ Back</button>
      <button id="flownext" onclick="flowStep(1)">Next ›</button>
      <button id="flowplay" onclick="flowPlay()">▶ Play</button>
      <span class="step-of" id="flowof"></span>
    </div>
    <div id="flowlistwrap"></div>
  </div>
  ${continueBtn(b, 'Step through the sequence, then continue.')}`;
}

/* PRACTICE · fixit — read broken code, pick the change that fixes it. */
function paneFixit(b){
  const picked=S.fixPick;
  const opt=b.options.find(o=>o.v===picked);
  return `
  <h1 class="title">${b.title}</h1>
  <p class="lede">${b.lede}</p>
  <div class="card">
    ${b.codeLabel?`<div class="label">${b.codeLabel}</div>`:''}
    <pre class="codebox">${esc(b.code)}</pre>
  </div>
  <div class="card">
    <div class="label">${b.prompt}</div>
    ${b.options.map(o=>`<button class="choice" aria-pressed="${picked===o.v}" onclick="pickFix('${o.v}')"><span class="pick"></span><span class="ctxt"><b>${o.t}</b><span>${o.d}</span></span></button>`).join('')}
    ${opt?`<div class="simverdict ${opt.correct?'good':'bad'}" style="margin-top:16px">${opt.correct?b.okNote:b.badNote}</div>`:''}
  </div>
  ${continueBtn(b, opt? (opt.correct?'Fixed. ✓':'You can re-pick, or carry the lesson forward.') : 'Pick a fix to continue.')}`;
}

/* OWN · decide — the learner writes their own ADR, keyed by the beat's stable
   id so the decision persists across modules (Q6). */
function paneOwn(b){
  const chosen=S.ownChoice;
  return `
  <h1 class="title">${b.title}</h1>
  <p class="lede">${b.lede}</p>
  <div class="card">
    <div class="label">${b.prompt}</div>
    ${b.options.map(o=>`<button class="choice" aria-pressed="${chosen===o.v}" onclick="pickOwn('${o.v}')"><span class="pick"></span><span class="ctxt"><b>${o.t}</b><span>${o.d}</span></span></button>`).join('\n    ')}
    <div style="margin-top:16px">
      <div class="label">${b.reasonLabel}</div>
      <textarea id="reason" placeholder="${esc(b.reasonPlaceholder||'')}" oninput="syncReason()">${esc(S._reason||'')}</textarea>
    </div>
    <div class="actions" style="margin-top:18px">
      <button class="btn" id="sealbtn" ${chosen?'':'disabled'} onclick="seal()">${esc(b.cta)} <span class="arr">→</span></button>
      <span class="hint">${chosen?'Writes your decision to the log.':'Pick an option to continue.'}</span>
    </div>
  </div>
  <div id="reflectbox">${S.reflectionShown?reflectionHTML():''}</div>
  `;
}
function reflectionHTML(){
  const m=activeModule();
  const choices=curChoices();
  const g=(S.guess && choices[S.guess])?S.guess:Object.keys(choices)[0];
  const decided = S.ownChoice || (m.slots.own && '—');
  return `<div class="card" style="margin-top:16px">
    <div class="done-seal">✦ ${esc(m.label)} ${m.capstone?'— design sealed':'mastered'}</div>
    <div class="reflect" style="margin-top:14px">
      <div class="r"><div class="rl">You guessed</div><div class="rt">${choices[g]?choices[g].t:'—'}</div></div>
      <div class="r"><div class="rl">You decided</div><div class="rt">${decided?`<b>${esc(decided)}</b> — recorded with your reasoning.`:'—'}</div></div>
      <div class="r"><div class="rl">Next</div><div class="rt">Use the <span style="font-family:var(--mono)">module ▾</span> switcher (top-right) to play another aspect. The skill-map navigation lands in Step 3.</div></div>
    </div>
  </div>`;
}

/* ============================ INTERACTIONS ============================ */
/* GATE (Q7, slot-owned): the engine knows Reveal must not be reachable until
   Confront has yielded a commit. The reveal beat is always the chapter right
   after the (single) confront beat, so the gate is: you cannot pass the confront
   chapter until S.committed is true. */
function revealLocked(targetChapter){
  const beats=moduleBeats();
  const revealIdx=beats.findIndex(x=>x.slot==='reveal');
  return revealIdx>=0 && targetChapter>=revealIdx && !S.committed;
}
function go(i){
  if(i>S.maxUnlocked) return;
  if(revealLocked(i)) return;                  // productive-failure gate
  S.chapter=i; render();
  const st=document.getElementById('stage'); if(st) st.scrollTo({top:0,behavior:'smooth'});
}
/* Advance to the NEXT chapter (no hardcoded index). Side effect: when we cross
   INTO a reveal beat, mint that module's authored reveal ADR (the "system"
   decision the lesson teaches). */
function advance(){
  const next=S.chapter+1;
  const beats=moduleBeats();
  if(next>=beats.length){ return; }            // already at the end
  S.maxUnlocked=Math.max(S.maxUnlocked,next);
  const nb=beats[next];
  if(nb && nb.slot==='reveal' && nb.beat.adr) addAdr(nb.beat.adr);
  go(next);
}

function pick(k){ if(S.committed) return; S.guess=k; commitGuess(); }
/* A confront-legal beat reports "committed"; reveal stays locked until then. */
function commitGuess(){
  if(S.guess && !S.committed){
    S.committed=true;
    const cb=activeModule().slots.confront;
    const choices=curChoices();
    logPath(cb.commitPath ? cb.commitPath(S.guess) : `First instinct: <b>${choices[S.guess].t.toLowerCase()}</b>`);
    render();
  }
}

function setSim(m){ S.simMode=m; document.querySelectorAll('#simseg button').forEach(b=>b.classList.toggle('on',b.dataset.m===m)); positionWindow(); resetTrack(); updateReadout(null); }
function positionWindow(){
  const w=document.getElementById('simwin'); if(!w) return;
  if(S.simMode==='fixed'){ w.style.left='0%'; w.style.width='50%'; }
  else { w.style.left='25%'; w.style.width='50%'; }
}
function resetTrack(){ document.querySelectorAll('#track .req').forEach(r=>r.remove()); }
function wireSim(){ positionWindow(); if(S.simResult) updateReadout(S.simResult); }
function reduced(){ return window.matchMedia('(prefers-reduced-motion: reduce)').matches; }

function fireBurst(){
  const track=document.getElementById('track'); if(!track) return;
  resetTrack();
  S.ranSim=true; logPath('Stress-tested the minute boundary');
  // 200 reqs: 100 just before :00 (left of center), 100 just after (right of center)
  const fixed = S.simMode==='fixed';
  // Fixed: counter resets at boundary -> both halves allowed -> 200. Sliding: one window -> 100 allowed, 100 blocked.
  const allowed = fixed?200:100;
  const dots = 22; // visual sample of the 200
  for(let i=0;i<dots;i++){
    const beforeBoundary = i < dots/2;
    const left = beforeBoundary ? (40 + i* (8)) : (52 + (i-dots/2)*(8)); // cluster around center (%) -> convert
    const xPct = beforeBoundary ? 44 + i*0.6 : 50 + (i-dots/2)*0.6;
    const d=document.createElement('div'); d.className='req';
    d.style.left = xPct+'%';
    // decide ok/blocked
    let ok;
    if(fixed){ ok=true; }
    else { ok = beforeBoundary; } // sliding counts them together; second half over the cap
    d.classList.add(ok?'ok':'blocked');
    track.appendChild(d);
    const delay = reduced()?0: i*55;
    setTimeout(()=>d.classList.add('in'), delay+20);
  }
  S.simResult = allowed;
  setTimeout(()=>updateReadout(allowed), reduced()?0:dots*55+120);
}
function updateReadout(allowed){
  const ra=document.getElementById('roAllow'), rv=document.getElementById('roVerdict'), note=document.getElementById('simnote');
  if(!ra) return;
  if(allowed===null){ ra.textContent='—'; ra.className='rv'; rv.textContent='—'; rv.className='rv'; note.className='simverdict'; note.innerHTML='Fire a burst and watch the boundary.'; return; }
  const bad = allowed>100;
  ra.textContent=allowed; ra.className='rv '+(bad?'bad':'good');
  rv.textContent = bad?'breached':'held'; rv.className='rv '+(bad?'bad':'good');
  note.className='simverdict '+(bad?'bad':'good');
  note.innerHTML = bad
    ? `<b>That’s the loophole.</b> The counter reset at <span style="font-family:var(--mono)">:00</span>, so 100 requests at <span style="font-family:var(--mono)">:59</span> + 100 at <span style="font-family:var(--mono)">:00</span> all passed — <b>double</b> your intended ceiling in ~1 second. Now flip to <b>sliding</b>.`
    : `<b>Held at 100.</b> The sliding window counts the trailing 60s as one stretch, so the burst can’t hide across the boundary. <span style="color:var(--warn)">Red</span> requests are the ones correctly rejected.`;
}

function pickFix(v){ S.fixPick=v; const beats=moduleBeats(); const b=beats[S.chapter].beat;
  const opt=b.options.find(o=>o.v===v);
  if(opt && opt.correct) logPath(`Fixed the key: <b>${esc(opt.t.toLowerCase())}</b>`);
  render(); }
function pickOwn(v){ S.ownChoice=v; const sb=document.getElementById('sealbtn'); if(sb) sb.disabled=false; render(); }
function syncReason(){ const t=document.getElementById('reason'); if(t) S._reason=t.value; }
function seal(){
  if(!S.ownChoice) return;
  const reason = document.getElementById('reason')?document.getElementById('reason').value:S._reason;
  S._reason=reason;
  const beats=moduleBeats();
  const b=beats[S.chapter].beat;                 // the active decide beat
  addMyAdr(b.id, b.adr, S.ownChoice, reason);
  logPath(`Your call: <b>${esc(S.ownChoice)}</b>`);
  // last chapter of the module? seal it with a reflection; else just advance.
  const last = S.chapter===beats.length-1;
  if(last){
    S.reflectionShown=true;
    document.getElementById('reflectbox').innerHTML=reflectionHTML();
    document.getElementById('barfill').style.width='100%';
    document.getElementById('reflectbox').scrollIntoView({behavior:'smooth',block:'center'});
  } else {
    advance();
  }
}

/* margin drawer (mobile) */
function openMargin(){ document.getElementById('margin').classList.add('open'); document.getElementById('scrim').classList.add('open'); }
function closeMargin(){ document.getElementById('margin').classList.remove('open'); document.getElementById('scrim').classList.remove('open'); }

/* ---- TEMP dev affordance (Step 2): a module <select> so the verifier can
   exercise all six. Replaced by the skill-map navigation in Step 3. ---- */
function switchModule(idx){
  idx=+idx; if(idx===activeIndex) return;
  stopFlowPlay();
  activeIndex=idx;
  resetModuleState();
  const sel=document.getElementById('devmod'); if(sel) sel.value=String(idx);
  render();
  const st=document.getElementById('stage'); if(st) st.scrollTo({top:0,behavior:'auto'});
}
function buildModuleSwitcher(){
  const sel=document.getElementById('devmod'); if(!sel) return;
  sel.innerHTML=CURRICULUM.modules.map((m,i)=>`<option value="${i}" ${i===activeIndex?'selected':''}>${esc(m.kick)} · ${esc(m.label)}</option>`).join('');
  sel.onchange=e=>switchModule(e.target.value);
}

/* ---- PERSISTENCE (Q8): cross-module decisions persist in localStorage, wrapped
   in try/catch with a silent in-memory fallback (sandboxed file:// may block it).
   We persist only the durable record — the learner's decisions — not transient
   per-chapter UI state. RESET wipes both stored + in-memory state. ---- */
const STORE_KEY='learn.ratelimiting.v2';
let _mem=null;                                  // in-memory fallback bucket
function persist(){
  const data={decisions:S.decisions};
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(data)); }
  catch(e){ _mem=data; }
}
function loadPersisted(){
  let data=null;
  try{ const raw=localStorage.getItem(STORE_KEY); if(raw) data=JSON.parse(raw); }
  catch(e){ data=_mem; }
  if(data && data.decisions){ S.decisions=data.decisions; }
}
/* MANDATORY reset button. Clears progress, mastery and decisions everywhere. */
function resetAll(){
  stopFlowPlay();
  try{ localStorage.removeItem(STORE_KEY); }catch(e){}
  _mem=null;
  S.path=[]; S.adrs=[]; S.decisions={};
  activeIndex=0; resetModuleState();
  buildModuleSwitcher();
  render();
  const st=document.getElementById('stage'); if(st) st.scrollTo({top:0,behavior:'auto'});
}

loadPersisted();
buildModuleSwitcher();
render();
</script>
